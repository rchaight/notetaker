name: Notetaker
options:
  bundleIdPrefix: com.rchaight
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 6A2NHN89Q8
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  VaultKit: { path: Packages/VaultKit }
  MarkdownKit: { path: Packages/MarkdownKit }
  EditorKit: { path: Packages/EditorKit }
  IndexKit: { path: Packages/IndexKit }
  TaskEngine: { path: Packages/TaskEngine }
  ProjectKit: { path: Packages/ProjectKit }
  ConversionKit: { path: Packages/ConversionKit }
  AIKit: { path: Packages/AIKit }
  SecurityKit: { path: Packages/SecurityKit }
  AppIntentsKit: { path: Packages/AppIntentsKit }
targets:
  NotetakerWidgets:
    type: app-extension
    supportedDestinations: [iOS, macOS]
    sources:
      - Widgets
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Notetaker Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rchaight.notetaker.widgets
        CODE_SIGN_ENTITLEMENTS: Widgets/NotetakerWidgets.entitlements
  Notetaker:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - App
    dependencies:
      - target: NotetakerWidgets
        embed: true
      - package: VaultKit
      - package: MarkdownKit
      - package: EditorKit
      - package: IndexKit
      - package: TaskEngine
      - package: ProjectKit
      - package: ConversionKit
      - package: AIKit
      - package: SecurityKit
      - package: AppIntentsKit
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Notetaker
        LSApplicationCategoryType: public.app-category.productivity
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: Notetaker connects to your own homelab servers (Ollama, docling-serve) for AI and document conversion.
        NSUbiquitousContainers:
          iCloud.com.rchaight.notetaker:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerSupportedFolderLevels: Any
            NSUbiquitousContainerName: Notetaker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rchaight.notetaker
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: App/Notetaker.entitlements
